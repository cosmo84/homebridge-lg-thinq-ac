name: Deprecate Old Versions

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version or range to deprecate (e.g. "0.1.5" or "<0.1.5")'
        required: true
      message:
        description: 'Deprecation message'
        required: true
        default: 'Please upgrade to the latest version.'

permissions:
  contents: read

jobs:
  deprecate:
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          registry-url: 'https://registry.npmjs.org'

      - name: Deprecate version
        run: npm deprecate homebridge-lg-thinqconnect-ac@"${{ github.event.inputs.version }}" "${{ github.event.inputs.message }}"
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
